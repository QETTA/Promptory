name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - genspark_ai_developer
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 타입 검사 + 빌드 검증
  # ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────
  # Cloudflare Pages 배포 (main 브랜치 → production)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://promptory.pages.dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: "https://promptory.pages.dev"
          CF_ACCESS_TEAM_DOMAIN: "lider-yohan.cloudflareaccess.com"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=promptory --branch=main

  # ─────────────────────────────────────────────────────────────
  # Cloudflare Pages 배포 (PR → preview)
  # ─────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy (Preview)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: "https://promptory-preview.pages.dev"
          CF_ACCESS_TEAM_DOMAIN: "lider-yohan.cloudflareaccess.com"

      - name: Deploy Preview to Cloudflare Pages
        id: cf-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=promptory --branch=preview-pr-${{ github.event.pull_request.number }}

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment\n\n✅ Preview deployed to Cloudflare Pages\n\n🔗 Preview URL: https://promptory-preview.pages.dev\n\n> 이 댓글은 자동으로 생성되었습니다.`
            })
